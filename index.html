<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCL Survey — University of Zurich</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Loading survey&hellip;</p>
  </div>

  <script>
    (function () {
      // ── Configuration ──────────────────────────────────────────────────────
      // Google Apps Script web-app URL (see apps_script_logger.gs)
      var LOG_URL = "https://script.google.com/macros/s/AKfycbz3Tyoo135Ka_ssaln4dWvdPRafqrpFnben4cFnyP-HhznkCIJed4gfIhvcvlHwxlAgVg/exec";

      // Qualtrics base survey URL (no trailing slash, no ?src=)
      var SURVEY_BASE_URL = "https://uzhwwf.qualtrics.com/jfe/form/SV_8wgD8eR8NFFKP6m";

      // Valid variation IDs — used to validate the src param
      var VALID_SRCS = [
        "research_forward_1", "weaker_2", "research_forward_3",
        "provocative_4", "provocative_5", "data_driven_6",
        "fomo_7", "fomo_8", "balanced_9", "philosophical_10"
      ];
      // ───────────────────────────────────────────────────────────────────────

      // Read ?src= from the current URL
      var params = new URLSearchParams(window.location.search);
      var src = params.get("src") || "unknown";

      // Validate src (don't log garbage)
      if (VALID_SRCS.indexOf(src) === -1) {
        src = "unknown";
      }

      // Build destination Qualtrics URL
      var destination = SURVEY_BASE_URL + "?src=" + encodeURIComponent(src);

      // Log via GET tracking pixel — NOT sendBeacon (sendBeacon uses POST; Apps Script
      // doGet() never runs, so the Sheet stays empty). Short delay before redirect so the
      // browser does not cancel the in-flight image request.
      try {
        var logUrl = LOG_URL + "?src=" + encodeURIComponent(src)
          + "&ts=" + Date.now()
          + "&ref=" + encodeURIComponent(document.referrer || "");
        var img = new Image();
        img.src = logUrl;
      } catch (e) {
        /* ignore */
      }

      setTimeout(function () {
        window.location.replace(destination);
      }, 250);
    })();
  </script>
</body>
</html>
