<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCL Survey — University of Zurich</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 0.95rem; }
    #debug { font-size: 0.75rem; color: #999; margin-top: 1rem; text-align: left; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="status">Loading survey&hellip;</p>
    <div id="debug"></div>
  </div>

  <script>
    (function () {
      var LOG_URL = "https://script.google.com/macros/s/AKfycbz3Tyoo135Ka_ssaln4dWvdPRafqrpFnben4cFnyP-HhznkCIJed4gfIhvcvlHwxlAgVg/exec";
      var SURVEY_BASE_URL = "https://uzhwwf.qualtrics.com/jfe/form/SV_8wgD8eR8NFFKP6m";
      var VALID_SRCS = [
        "research_forward_1", "weaker_2", "research_forward_3",
        "provocative_4", "provocative_5", "data_driven_6",
        "fomo_7", "fomo_8", "balanced_9", "philosophical_10"
      ];

      // ── Debug helpers (remove ?debug from URL to hide) ──
      var showDebug = window.location.search.indexOf("debug") !== -1;
      var debugEl = document.getElementById("debug");
      var statusEl = document.getElementById("status");
      function log(msg) {
        if (showDebug) debugEl.innerHTML += msg + "<br>";
        console.log("[redirect]", msg);
      }

      // ── Read src ──
      var params = new URLSearchParams(window.location.search);
      var src = params.get("src") || "unknown";
      if (VALID_SRCS.indexOf(src) === -1) src = "unknown";
      log("src = " + src);

      var destination = SURVEY_BASE_URL + "?src=" + encodeURIComponent(src);
      log("destination = " + destination);

      // ── Build logging URL ──
      var logUrl = LOG_URL
        + "?src=" + encodeURIComponent(src)
        + "&ts=" + Date.now()
        + "&ref=" + encodeURIComponent(document.referrer || "");
      log("logUrl = " + logUrl);

      var redirected = false;
      function go(reason) {
        if (redirected) return;
        redirected = true;
        log("Redirecting (" + reason + ")");
        statusEl.textContent = "Redirecting to survey\u2026";
        window.location.replace(destination);
      }

      // ── Strategy 1: fetch with no-cors (most reliable for cross-origin GET) ──
      // The server processes the request; we get an opaque response but don't need it.
      log("Sending fetch (no-cors GET)\u2026");
      fetch(logUrl, { method: "GET", mode: "no-cors", credentials: "omit" })
        .then(function () {
          log("fetch resolved");
          go("fetch ok");
        })
        .catch(function (err) {
          log("fetch failed: " + err);
          // ── Strategy 2: fallback to Image pixel ──
          log("Trying Image pixel fallback\u2026");
          try {
            var img = new Image();
            img.onload = function () { go("img onload"); };
            img.onerror = function () { go("img onerror"); };
            img.src = logUrl;
          } catch (e2) {
            go("all failed");
          }
        });

      // ── Safety net: redirect after 4 s no matter what ──
      setTimeout(function () { go("timeout"); }, 4000);
    })();
  </script>
</body>
</html>
